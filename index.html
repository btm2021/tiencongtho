<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng công thợ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="label">Sổ công thợ</p>
          <h1>Bảng công theo ngày</h1>
        </div>

        <label class="month-field" for="workMonth">
          Tháng
          <input id="workMonth" type="month" />
        </label>
      </header>

      <section class="sheet-panel" aria-labelledby="sheetTitle">
        <div class="sheet-heading">
          <div>
            <h2 id="sheetTitle">Nhập số thợ từng buổi</h2>
            <span>1 buổi = 0,5 công</span>
          </div>
          <button id="clearMonthBtn" type="button" class="ghost-button">Xóa tháng này</button>
        </div>

        <form id="quickEntryForm" class="quick-entry">
          <label>
            Ngày
            <input id="entryDate" type="date" required />
          </label>

          <fieldset>
            <legend>Sáng</legend>
            <label>
              Thợ chính
              <input id="morningMain" type="number" min="0" step="1" inputmode="numeric" />
            </label>
            <label>
              Thợ phụ
              <input id="morningHelper" type="number" min="0" step="1" inputmode="numeric" />
            </label>
          </fieldset>

          <fieldset>
            <legend>Chiều</legend>
            <label>
              Thợ chính
              <input id="afternoonMain" type="number" min="0" step="1" inputmode="numeric" />
            </label>
            <label>
              Thợ phụ
              <input id="afternoonHelper" type="number" min="0" step="1" inputmode="numeric" />
            </label>
          </fieldset>

          <button class="primary-button" type="submit">Cập nhật</button>
        </form>

        <div class="sheet-scroll">
          <table class="timesheet" aria-describedby="sheetTitle">
            <thead>
              <tr>
                <th rowspan="2" class="date-col">Ngày</th>
                <th colspan="2">Buổi sáng</th>
                <th colspan="2">Buổi chiều</th>
                <th colspan="2">Tự tính</th>
              </tr>
              <tr>
                <th>Thợ chính</th>
                <th>Thợ phụ</th>
                <th>Thợ chính</th>
                <th>Thợ phụ</th>
                <th>Tổng công</th>
                <th>Thành tiền</th>
              </tr>
            </thead>
            <tbody id="sheetBody"></tbody>
            <tfoot id="sheetFoot"></tfoot>
          </table>
        </div>
      </section>

      <section class="status-bar" aria-live="polite">
        <div>
          <span>Tổng tiền</span>
          <strong id="grandTotal">0đ</strong>
        </div>
        <div>
          <span>Tổng công</span>
          <strong id="workTotal">0</strong>
        </div>
        <div>
          <span>Thợ chính</span>
          <strong id="mainTotal">0đ</strong>
        </div>
        <div>
          <span>Thợ phụ</span>
          <strong id="helperTotal">0đ</strong>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
