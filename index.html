<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng công thợ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites/dist/jsuites.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/jspreadsheet.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="label">Sổ công thợ</p>
          <h1>Bảng công theo ngày</h1>
        </div>

        <label class="month-field" for="workMonth">
          Tháng
          <input id="workMonth" type="month" />
        </label>
      </header>

      <section class="summary" aria-live="polite">
        <div class="summary-primary">
          <span>Tổng tiền</span>
          <strong id="grandTotal">0đ</strong>
        </div>
        <div>
          <span>Tổng công</span>
          <strong id="workTotal">0</strong>
        </div>
        <div>
          <span>Thợ chính</span>
          <strong id="mainTotal">0đ</strong>
        </div>
        <div>
          <span>Thợ phụ</span>
          <strong id="helperTotal">0đ</strong>
        </div>
      </section>

      <section class="sheet-panel" aria-labelledby="sheetTitle">
        <div class="sheet-heading">
          <div>
            <h2 id="sheetTitle">Nhập số thợ từng buổi</h2>
            <span>1 buổi = 0,5 công</span>
          </div>
          <button id="clearMonthBtn" type="button" class="ghost-button">Xóa tháng này</button>
        </div>

        <form id="quickEntryForm" class="quick-entry">
          <label>
            Ngày
            <input id="entryDate" type="date" required />
          </label>
          <label>
            Sáng - thợ chính
            <input id="morningMain" type="number" min="0" step="1" inputmode="numeric" />
          </label>
          <label>
            Sáng - thợ phụ
            <input id="morningHelper" type="number" min="0" step="1" inputmode="numeric" />
          </label>
          <label>
            Chiều - thợ chính
            <input id="afternoonMain" type="number" min="0" step="1" inputmode="numeric" />
          </label>
          <label>
            Chiều - thợ phụ
            <input id="afternoonHelper" type="number" min="0" step="1" inputmode="numeric" />
          </label>
          <button class="primary-button" type="submit">Cập nhật</button>
        </form>

        <div class="sheet-scroll">
          <div id="spreadsheet" aria-describedby="sheetTitle"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jsuites/dist/jsuites.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/index.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
